name: MT3600BE Build

on:
  workflow_run:
    workflows: ["MT3600BE Check"]
    types:
      - completed

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev file wget curl ca-certificates

      - name: Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build firmware
        run: |
          make defconfig
          make -j"$(nproc)" || make -j1 V=s

      - name: Package firmware artifact
        run: |
          set -e
          FW="bin/targets/mediatek/filogic/openwrt-mediatek-filogic-glinet_gl-mt3600be-squashfs-sysupgrade.bin"
          test -f "$FW"
          VERSION="$(git show -s --date=format:%y%m%d%H --format=%cd ${{ github.event.workflow_run.head_sha }})"
          mkdir -p out
          cp "$FW" "out/${VERSION}.bin"
          sha256sum "out/${VERSION}.bin" | awk '{print $1}' > "out/${VERSION}.sha"
          printf "%s\n" "${VERSION}" > out/version.txt
          printf "%s\n" "${{ github.event.workflow_run.head_sha }}" > out/source_sha.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mt3600be-firmware
          path: out/*
